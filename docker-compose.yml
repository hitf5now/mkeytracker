##
## Local development stack — PostgreSQL 16 + Redis 7
##
## Usage:
##   npm run db:up      # start postgres + redis
##   npm run db:down    # stop (preserves data)
##   npm run db:reset   # nuke volumes and restart clean
##
## This file is NOT for Unraid. Production deployment lives in
## docker-compose.prod.yml and uses different networks, ports,
## and volume paths.
##

services:
  postgres:
    image: postgres:16-alpine
    container_name: mplus-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mplus
      POSTGRES_PASSWORD: mplus_dev_password
      POSTGRES_DB: mplus_platform
    ports:
      - "5432:5432"
    volumes:
      - mplus-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mplus -d mplus_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mplus-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - mplus-dev-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mplus-dev-postgres:
  mplus-dev-redis:
